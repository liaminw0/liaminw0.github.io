{{- define "main" }}
<header class="page-header">
  <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
  </h1>
  {{- if .Description }}
  <div class="post-description">
      {{ .Description }}
  </div>
  {{- end }}
  {{- if not (.Param "hideMeta") }}
  <div class="post-meta">
      {{- partial "translation_list.html" . -}}
  </div>
  {{- end }}
</header>
<main>
    {{ partial "subscribe.html" . }}
</main>


{{- end }}{{/* end main */}}
